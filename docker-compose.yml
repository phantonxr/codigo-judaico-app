services:
  erp-db:
    image: postgres:17-alpine
    container_name: codigo-judaico-postgres
    environment:
      POSTGRES_DB: codjudaicotest
      POSTGRES_USER: judaictotest
      POSTGRES_PASSWORD: Jud@2026Wa!
    ports:
      - "5432:5432"
    volumes:
      - codigo-judaico-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judaictotest -d codjudaicotest"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/CodigoJudaico.Api/Dockerfile
    container_name: codigo-judaico-api
    depends_on:
      erp-db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=72.60.157.60;Port=5432;Database=codjudaicotest;Username=judaictotest;Password=Jud@2026Wa!
    ports:
      - "8080:8080"

volumes:
  codigo-judaico-postgres-data:
